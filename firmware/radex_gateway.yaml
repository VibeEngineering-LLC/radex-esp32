# ══════════════════════════════════════════════════════════════════════
#  radex_gateway.yaml — Radex MR107ion BLE → Web UI + Народмон
#  v0.3.0 — ПЕРЕСБОРКА С НУЛЯ от официального bt-proxy baseline.
#
#  Решение оператора (2026-06-14): «зайти заново — установить стандартную
#  прошивку БТ-прокси с гита ESPHome и пошагово вписывать датчики».
#  Вместо борьбы с тесным heap v0.2.x — собираем с известно-стабильной
#  официальной базы (esphome/bluetooth-proxies/esp32-generic.yaml) и находим
#  бисекцией, какой именно блок датчиков вызывает json:111 (если вызывает).
#
#  БАЗА (дословно upstream esp32-generic.yaml, non-factory):
#    framework esp-idf, esp32_ble_tracker scan active:true (defaults),
#    bluetooth_proxy active:true, safe_mode + factory_reset кнопки.
#  ДОБАВЛЕНО поверх (наш scaffold): фикс. имя radex-gw, secrets-WiFi + AP,
#    OTA-пароль, api.encryption, web_server v3, mdns, WiFi-watchdog,
#    UART heap-log (диагностика, удаляется в релизе).
#
#  ШАГ 0 (этот файл): scaffold + web-стек, БЕЗ product-сенсоров. Пол отсчёта
#    для вопроса json:111 — мало сущностей, браузер + F5 должны быть чисты.
#  Дальше пошагово: радон last → климат → диагностика → Народмон →
#    радон avg(device) ПОСЛЕДНИМ. Radon min/max — ВЫКИНУТЫ (оператор 2026-06-14).
# ══════════════════════════════════════════════════════════════════════

substitutions:
  device_name: radex-gw
  device_friendly: "Radex MR107ion BLE Gateway"
  build_path: D:/esp32_radex_build/radex-gw

esphome:
  name: ${device_name}
  friendly_name: ${device_friendly}
  comment: "Radex MR107ion -> Web UI + Narodmon (rebuild from bt-proxy base)"
  min_version: 2025.8.0
  build_path: ${build_path}
  includes:
    - include/esp_diag.h
    - include/radex_read_hook.h
  on_boot:
    priority: -300
    then:
      - lambda: |-
          // STEP 7 (2026-06-15): публикуем BLE-счётчики на буте. Без этого
          // ble_disconnects не публикуется до первого дисконнекта → "2.3 = NA"
          // в Web UI, хотя реальное значение = 0.
          id(ble_connects).publish_state((float) id(ble_connect_count));
          id(ble_disconnects).publish_state((float) id(ble_disconnect_count));
          ESP_LOGI("boot", "Radex Gateway v0.3.0-step8 (bluetooth_proxy disabled to isolate Radex BLE stability) booted, web UI: http://%s.local/", "${device_name}");

esp32:
  board: esp32dev
  framework:
    type: esp-idf
    # STEP 4b (2026-06-14): на step4 (LWIP_MAX_SOCKETS=10 дефолт) исходящий
    # http_request.get() к narodmon.ru падал на socket() syscall:
    #   esp-tls: Failed to create socket (family 2 socktype 1 protocol 0)
    #   HTTP_CLIENT: Connection failed, sock < 0
    #   ESP_ERR_HTTP_CONNECT (= ESP_ERR_ESP_TLS_CANNOT_CREATE_SOCKET 0x8002)
    # Корень — LWIP socket pool исчерпан: web_server httpd (max_open_sockets≈7)
    # + api (1-2) + mdns/sntp/wifi (~2) + 1 outbound HTTP уже выходило за 10.
    # Бамп до 16 — даёт запас headroom под исходящий HTTP при активном Web UI.
    #
    # STEP 4c (2026-06-14): на step4b — task_wdt timeout 5с (дефолт) убивал
    # loop task через ~4.5с после нажатия кнопки, потому что http_request.get
    # к глухому narodmon (PC тоже не достучался за 25с) — sync-блокирующий
    # вызов внутри script.execute; пока он ждёт connect/response, loop не
    # тикает → task_wdt: Print CPU 1 backtrace → SW_CPU_RESET (0xc).
    # Бамп до 60с — даёт http_request полные 30с-timeout не падая в reboot.
    # WiFi-watchdog (180с) ниже всё равно поймает реальный WiFi-hang.
    sdkconfig_options:
      CONFIG_LWIP_MAX_SOCKETS: "16"
      CONFIG_ESP_TASK_WDT_TIMEOUT_S: "60"

logger:
  # 2026-06-14 (v0.3.0-step6d-clean): откат на INFO. step6c-log проверил гипотезу
  # «WARN+collapsible Debug Log» — НЕ сработало: json:111=141 при открытии Web UI
  # в Chrome (114 событий за один кластер 11:59). Причина: <esp-log> SSE-канал
  # сам по себе несёт оверхед (initial snapshot лог-буфера + поток событий),
  # который НЕ контролируется через logger.level — фильтр уровнем режет content,
  # но размер канала overflow'ит JsonDocument при первом коннекте браузера.
  # → log:false ниже + INFO (UART/api-forwarding к HA), без панели в Web UI.
  level: INFO
  baud_rate: 115200

wifi:
  # Без BSSID-пина: ESP сам выберет точку с лучшим RSSI.
  # fast_connect снят — он полезен ТОЛЬКО при bssid pin.
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  power_save_mode: none
  output_power: 8.5dB
  ap:
    ssid: "radex-gw Fallback"

api:
  encryption:
    key: !secret api_encryption_key
  # gateway автономен без HA -> не ребутиться при отсутствии клиента.
  # Авто-recovery от зависшего WiFi даёт собственный watchdog (interval ниже).
  reboot_timeout: 0s

ota:
  - platform: esphome
    id: ota_esphome
    password: !secret ota_password
  - platform: web_server

web_server:
  # 2026-06-14 (v0.3.0-step6f): возврат на v3 ради sorting_groups (двух таблиц).
  # step6e (v2 + auth + log:false) дал json:111=0 при 12×F5 — но v2 не поддерживает
  # sorting_groups, а оператор просит две таблицы (Данные + Сервис).
  # Гипотеза: auth+log:false в v3 тоже устранят json:111. Логика — auth выкидывает
  # фантомные SSE-коннекты (XRay-keep-alive INC-10, HA-автодискавери, бот-сканеры,
  # Chrome auto-prefetch) на TCP-401 ДО открытия /events, а log:false убирает
  # Debug Log SSE-канал. Без фоновой нагрузки даже единый JsonDocument v3
  # имеет запас под легитимный snapshot. Если json:111 вернётся — fallback на v2
  # с одной визуальной таблицей.
  version: 3
  port: 80
  include_internal: false
  local: true
  log: false
  auth:
    username: !secret web_server_auth_user
    password: !secret web_server_auth_pass
  # Две таблицы: Данные (показания + uptime по запросу оператора) и Сервис
  # (диагностика + кнопки + настройки + Народмон).
  sorting_groups:
    - id: sg_data
      name: "Данные"
      sorting_weight: 10
    - id: sg_service
      name: "Сервис"
      sorting_weight: 20

mdns:
  disabled: false

# ── STEP 4: HTTP-клиент для Народмона + SNTP-время ──
http_request:
  id: http_client
  # narodmon.ru может отвечать медленно (на тестах с PC до 81 с до 503 на пике
  # нагрузки). Поднял 10s → 30s, чтобы прошивка не отбрасывала запрос как
  # timeout если сервер просто медленный.
  timeout: 30s
  useragent: "esphome-radex-gw/0.3"
  verify_ssl: false

time:
  - platform: sntp
    id: sntp_time
    timezone: Europe/Moscow

# ── БАЗА bt-proxy (upstream esp32-generic.yaml) ──
esp32_ble_tracker:
  scan_parameters:
    # coex-fix (2026-06-14): duty ~5% (interval 640 / window 32), было ~9.4%
    # дефолт (320/30) — отдать радио WiFi на фоне mid-session deauth.
    # interval 640ms НЕ кратен adv Radex (~1000ms) → без фазового резонанса.
    interval: 640ms
    window: 32ms
    active: true

esp32_ble:
  max_connections: 4

# bluetooth_proxy УБРАН (2026-06-21): WiFi-интерференция 2.4 ГГц.

# ── STEP 3: globals для счётчиков BLE connect/disconnect ──
globals:
  - id: ble_connect_count
    type: uint32_t
    restore_value: false
    initial_value: '0'
  - id: ble_disconnect_count
    type: uint32_t
    restore_value: false
    initial_value: '0'

# ── STEP 1: ble_client к Radex MR107ion + READ-poll одного хэндла radon_last ──
ble_client:
  - mac_address: !secret radex_mac
    id: ble_radex
    auto_connect: true
    on_connect:
      - lambda: |-
          id(ble_connect_count) += 1;
          ESP_LOGI("radex", "===== Radex CONNECTED (#%u) =====", (unsigned) id(ble_connect_count));
          id(ble_connects).publish_state((float) id(ble_connect_count));
          id(ble_connected).publish_state(true);
    on_disconnect:
      - lambda: |-
          id(ble_disconnect_count) += 1;
          ESP_LOGW("radex", "Radex DISCONNECT (#%u)", (unsigned) id(ble_disconnect_count));
          id(ble_disconnects).publish_state((float) id(ble_disconnect_count));
          id(ble_connected).publish_state(false);

sensor:
  # ─── ДАННЫЕ (sg_data) ───
  - platform: template
    name: "ОА радона (последняя)"
    id: radon_last
    unit_of_measurement: "Bq/m³"
    accuracy_decimals: 1
    icon: "mdi:radioactive"
    update_interval: never
    web_server:
      sorting_group_id: sg_data
      sorting_weight: 10

  - platform: template
    name: "ОА радона (среднее, прибор)"
    id: radon_avg_device
    unit_of_measurement: "Bq/m³"
    accuracy_decimals: 1
    icon: "mdi:radioactive-circle"
    update_interval: never
    web_server:
      sorting_group_id: sg_data
      sorting_weight: 20

  - platform: template
    name: "Температура"
    id: temp_radex
    unit_of_measurement: "°C"
    accuracy_decimals: 1
    icon: "mdi:thermometer"
    device_class: temperature
    state_class: measurement
    update_interval: never
    web_server:
      sorting_group_id: sg_data
      sorting_weight: 30

  - platform: template
    name: "Влажность"
    id: humidity_radex
    unit_of_measurement: "%"
    accuracy_decimals: 1
    icon: "mdi:water-percent"
    device_class: humidity
    state_class: measurement
    update_interval: never
    web_server:
      sorting_group_id: sg_data
      sorting_weight: 40

  # Uptime — в Данные (запрос оператора 2026-06-14 «Uptime прибора»,
  # должен быть на видном месте). Снят entity_category: diagnostic чтобы
  # ESPHome не вытолкнул его в служебную таблицу автоматически.
  - platform: uptime
    name: "Время работы"
    id: esp_uptime
    update_interval: 30s
    web_server:
      sorting_group_id: sg_data
      sorting_weight: 50

  # ─── СЕРВИС (sg_service) ───
  - platform: wifi_signal
    name: "WiFi сигнал"
    id: wifi_rssi
    update_interval: 30s
    entity_category: diagnostic
    web_server:
      sorting_group_id: sg_service
      sorting_weight: 10

  - platform: template
    name: "BLE: успешных коннектов"
    id: ble_connects
    accuracy_decimals: 0
    icon: "mdi:bluetooth-connect"
    update_interval: never
    entity_category: diagnostic
    web_server:
      sorting_group_id: sg_service
      sorting_weight: 20

  - platform: template
    name: "BLE: реконнектов всего"
    id: ble_disconnects
    accuracy_decimals: 0
    icon: "mdi:bluetooth-off"
    update_interval: never
    entity_category: diagnostic
    web_server:
      sorting_group_id: sg_service
      sorting_weight: 30

binary_sensor:
  # BLE connectivity — в Данные (показывает, есть ли вообще измерения).
  - platform: template
    name: "BLE: Radex подключён"
    id: ble_connected
    device_class: connectivity
    icon: "mdi:bluetooth"
    web_server:
      sorting_group_id: sg_data
      sorting_weight: 5

  - platform: status
    name: "API подключён"
    id: api_connected
    entity_category: diagnostic
    web_server:
      sorting_group_id: sg_service
      sorting_weight: 40

text_sensor:
  - platform: wifi_info
    ip_address:
      name: "IP адрес"
      id: wifi_ip
      icon: "mdi:ip-network"
      entity_category: diagnostic
      web_server:
        sorting_group_id: sg_service
        sorting_weight: 50
    ssid:
      name: "Подключено к WiFi"
      id: wifi_ssid_t
      icon: "mdi:wifi"
      entity_category: diagnostic
      web_server:
        sorting_group_id: sg_service
        sorting_weight: 60
    bssid:
      name: "WiFi BSSID"
      id: wifi_bssid_t
      icon: "mdi:access-point"
      entity_category: diagnostic
      web_server:
        sorting_group_id: sg_service
        sorting_weight: 70
    mac_address:
      name: "ESP32 MAC"
      id: esp_mac
      icon: "mdi:network"
      entity_category: diagnostic
      web_server:
        sorting_group_id: sg_service
        sorting_weight: 80

button:
  - platform: safe_mode
    id: button_safe_mode
    name: "Перезагрузить (Safe Mode)"
    icon: "mdi:restart"
    web_server:
      sorting_group_id: sg_service
      sorting_weight: 100

  - platform: factory_reset
    id: factory_reset_btn
    name: "Сброс к заводским"
    icon: "mdi:factory"
    web_server:
      sorting_group_id: sg_service
      sorting_weight: 110

  # v0.3.0-step6: ручной BLE-реконнект (аналог AtomFast «Переподключиться»).
  # ble_client.disconnect → auto_connect:true сам поднимет связь обратно.
  - platform: template
    name: "Переподключиться к Radex"
    id: ble_reconnect_btn
    icon: "mdi:bluetooth-transfer"
    on_press:
      - lambda: |-
          ESP_LOGI("radex", "Manual BLE reconnect requested");
          id(ble_radex).disconnect();
    web_server:
      sorting_group_id: sg_service
      sorting_weight: 120

  # v0.3.0-step6f: сброс счётчиков BLE (запрос оператора 2026-06-14).
  # Обнуляет globals + публикует 0 в template-сенсоры, чтобы Web UI
  # сразу показал свежие нули.
  - platform: template
    name: "Сбросить счётчики BLE"
    id: ble_counters_reset
    icon: "mdi:counter"
    on_press:
      - lambda: |-
          id(ble_connect_count) = 0;
          id(ble_disconnect_count) = 0;
          id(ble_connects).publish_state(0);
          id(ble_disconnects).publish_state(0);
          ESP_LOGI("radex", "BLE counters reset to 0");
    web_server:
      sorting_group_id: sg_service
      sorting_weight: 130

  # STEP 4: ручной триггер выгрузки на Народмон (для отладки и теста)
  - platform: template
    name: "Отправить на Народмон сейчас"
    id: narodmon_send_now
    icon: "mdi:cloud-upload"
    on_press:
      - script.execute: send_narodmon
    web_server:
      sorting_group_id: sg_service
      sorting_weight: 200

# ── STEP 4: Народмон switch + editable metric names ──
switch:
  - platform: template
    name: "Выгружать на Народмон"
    id: narodmon_enabled
    icon: "mdi:cloud-upload"
    restore_mode: ALWAYS_OFF       # HARD-правило проекта: после ребута/safe-mode/OTA switch ВСЕГДА OFF
    optimistic: true
    web_server:
      sorting_group_id: sg_service
      sorting_weight: 210

# v0.3.0-step6g: выбор протокола Народмона (запрос оператора 2026-06-14,
# «прочитай скилл»). По narodmon-iot SKILL.md есть несколько вариантов:
#   HTTP GET   — самый простой, поддерживается ESPHome out-of-box (текущий способ).
#                Параметры в URL, длина ограничена, но для 1 прибора с 3 метриками
#                влезает с запасом. Endpoint http://narodmon.ru/get
#   HTTP POST  — те же поля в form-encoded body. Endpoint http://narodmon.ru/post.
#                Проксе-дружелюбен (некоторые прокси режут длинные GET).
#   HTTPS POST — то же тело, но через TLS на https://narodmon.ru/post.
#                Тяжелее по heap/CPU (mbedTLS handshake), полезно если требуется
#                шифровать поля или защита от MITM в недоверенной сети.
#   JSON POST  — тело JSON `{"devices":[{"mac":"…","sensors":[{"id":"…","value":…}]}]}`
#                на http://narodmon.ru/json (Content-Type: application/json). По
#                спецификации скилла (narodmon-iot SKILL.md, раздел «JSON POST»)
#                это «один HTTP-запрос на N устройств» — у нас N=1, но формат
#                расширяемый, и сервер отвечает тоже JSON'ом (легче парсить).
# MQTT multi-device пока пропущен — на edge-прошивке оверкилл для 1 прибора.
select:
  - platform: template
    name: "Способ отправки на Народмон"
    id: narodmon_method
    icon: "mdi:upload-network"
    optimistic: true
    restore_value: true
    initial_option: "HTTP GET"
    options:
      - "HTTP GET"
      - "HTTP POST"
      - "HTTPS POST"
      - "JSON POST"
    web_server:
      sorting_group_id: sg_service
      sorting_weight: 220

text:
  - platform: template
    name: "Имя метрики: радон"
    id: nm_radon
    optimistic: true
    restore_value: true
    mode: text
    initial_value: "RR1"
    icon: "mdi:tag-text"
    web_server:
      sorting_group_id: sg_service
      sorting_weight: 230

  - platform: template
    name: "Имя метрики: температура"
    id: nm_temp
    optimistic: true
    restore_value: true
    mode: text
    initial_value: "T1"
    icon: "mdi:tag-text"
    web_server:
      sorting_group_id: sg_service
      sorting_weight: 240

  - platform: template
    name: "Имя метрики: влажность"
    id: nm_hum
    optimistic: true
    restore_value: true
    mode: text
    initial_value: "H1"
    icon: "mdi:tag-text"
    web_server:
      sorting_group_id: sg_service
      sorting_weight: 250

# ── STEP 4 / step6f: send_narodmon script (manual + auto), 3 метода ──
# Метод выбирается через select `narodmon_method` (HTTP GET / HTTP POST / HTTPS POST).
# Тело payload одинаковое: ID=<ESP_MAC>&<RR1>=<radon>&<T1>=<temp>&<H1>=<hum>.
# Разница только в transport: GET кладёт в URL, POST/HTTPS POST — в form-body.
script:
  - id: send_narodmon
    then:
      - if:
          condition:
            and:
              - wifi.connected:
              - lambda: "return !std::isnan(id(radon_last).state);"
          then:
            # ── HTTP GET ──────────────────────────────────────────────
            - if:
                condition:
                  lambda: 'return id(narodmon_method).state == "HTTP GET";'
                then:
                  - http_request.get:
                      url: !lambda |-
                        char url[320];
                        float temp = std::isnan(id(temp_radex).state) ? 0.0f : id(temp_radex).state;
                        float hum  = std::isnan(id(humidity_radex).state) ? 0.0f : id(humidity_radex).state;
                        snprintf(url, sizeof(url),
                          "http://narodmon.ru/get?ID=%s&%s=%.1f&%s=%.1f&%s=%.0f",
                          id(esp_mac).state.c_str(),
                          id(nm_radon).state.c_str(), id(radon_last).state,
                          id(nm_temp).state.c_str(),  temp,
                          id(nm_hum).state.c_str(),   hum);
                        ESP_LOGI("narodmon", "GET %s", url);
                        return std::string(url);
                      capture_response: true
                      on_response:
                        then:
                          - lambda: |-
                              ESP_LOGI("narodmon", "GET HTTP %d, body: %s",
                                       response->status_code, body.c_str());
            # ── HTTP POST ─────────────────────────────────────────────
            - if:
                condition:
                  lambda: 'return id(narodmon_method).state == "HTTP POST";'
                then:
                  - http_request.post:
                      url: "http://narodmon.ru/post"
                      request_headers:
                        Content-Type: "application/x-www-form-urlencoded"
                      body: !lambda |-
                        char body[320];
                        float temp = std::isnan(id(temp_radex).state) ? 0.0f : id(temp_radex).state;
                        float hum  = std::isnan(id(humidity_radex).state) ? 0.0f : id(humidity_radex).state;
                        snprintf(body, sizeof(body),
                          "ID=%s&%s=%.1f&%s=%.1f&%s=%.0f",
                          id(esp_mac).state.c_str(),
                          id(nm_radon).state.c_str(), id(radon_last).state,
                          id(nm_temp).state.c_str(),  temp,
                          id(nm_hum).state.c_str(),   hum);
                        ESP_LOGI("narodmon", "POST body: %s", body);
                        return std::string(body);
                      capture_response: true
                      on_response:
                        then:
                          - lambda: |-
                              ESP_LOGI("narodmon", "POST HTTP %d, body: %s",
                                       response->status_code, body.c_str());
            # ── HTTPS POST ────────────────────────────────────────────
            - if:
                condition:
                  lambda: 'return id(narodmon_method).state == "HTTPS POST";'
                then:
                  - http_request.post:
                      url: "https://narodmon.ru/post"
                      request_headers:
                        Content-Type: "application/x-www-form-urlencoded"
                      body: !lambda |-
                        char body[320];
                        float temp = std::isnan(id(temp_radex).state) ? 0.0f : id(temp_radex).state;
                        float hum  = std::isnan(id(humidity_radex).state) ? 0.0f : id(humidity_radex).state;
                        snprintf(body, sizeof(body),
                          "ID=%s&%s=%.1f&%s=%.1f&%s=%.0f",
                          id(esp_mac).state.c_str(),
                          id(nm_radon).state.c_str(), id(radon_last).state,
                          id(nm_temp).state.c_str(),  temp,
                          id(nm_hum).state.c_str(),   hum);
                        ESP_LOGI("narodmon", "HTTPS POST body: %s", body);
                        return std::string(body);
                      capture_response: true
                      on_response:
                        then:
                          - lambda: |-
                              ESP_LOGI("narodmon", "HTTPS POST HTTP %d, body: %s",
                                       response->status_code, body.c_str());
            # ── JSON POST ─────────────────────────────────────────────
            # http://narodmon.ru/json, Content-Type application/json.
            # Тело: {"devices":[{"mac":"<MAC>","sensors":[
            #         {"id":"<RR1>","value":<radon>},
            #         {"id":"<T1>","value":<temp>},
            #         {"id":"<H1>","value":<hum>}]}]}
            # Минимум по спецификации Народмона: mac + sensors[].id + .value.
            # Сервер отвечает JSON: {"error":"OK","errno":200} при успехе.
            - if:
                condition:
                  lambda: 'return id(narodmon_method).state == "JSON POST";'
                then:
                  - http_request.post:
                      url: "http://narodmon.ru/json"
                      request_headers:
                        Content-Type: "application/json"
                      body: !lambda |-
                        char body[320];
                        float temp = std::isnan(id(temp_radex).state) ? 0.0f : id(temp_radex).state;
                        float hum  = std::isnan(id(humidity_radex).state) ? 0.0f : id(humidity_radex).state;
                        snprintf(body, sizeof(body),
                          "{\"devices\":[{\"mac\":\"%s\",\"sensors\":["
                            "{\"id\":\"%s\",\"value\":%.1f},"
                            "{\"id\":\"%s\",\"value\":%.1f},"
                            "{\"id\":\"%s\",\"value\":%.0f}"
                          "]}]}",
                          id(esp_mac).state.c_str(),
                          id(nm_radon).state.c_str(), id(radon_last).state,
                          id(nm_temp).state.c_str(),  temp,
                          id(nm_hum).state.c_str(),   hum);
                        ESP_LOGI("narodmon", "JSON POST body: %s", body);
                        return std::string(body);
                      capture_response: true
                      on_response:
                        then:
                          - lambda: |-
                              ESP_LOGI("narodmon", "JSON POST HTTP %d, body: %s",
                                       response->status_code, body.c_str());
          else:
            - lambda: 'ESP_LOGW("narodmon", "skip: wifi=%d radon_nan=%d", wifi::global_wifi_component->is_connected(), std::isnan(id(radon_last).state));'

output:
  - platform: gpio
    pin: GPIO2
    id: heartbeat_led

# ── Диагностика (UART-only, удаляется в релизе) ──
interval:
  - interval: 2s
    then:
      - output.turn_on: heartbeat_led
      - delay: 100ms
      - output.turn_off: heartbeat_led

  # ── READ-poll round-robin по 4 хэндлам каждые 4.3с ──
  # 0x0040 radon_avg_device, 0x0049 radon_last, 0x0058 temperature, 0x005E humidity.
  # Период обновления каждого = 4 * 4.3 = 17.2с. Round-robin вместо batch'а —
  # меньше per-tick Bluedroid-аллокаций, бережёт heap headroom (урок INC-07).
  # Радон: гард только NaN/отрицательные — top-of-scale MR107ion
  # не документирован Quarta-Rad, верхнего лимита не угадываем.
  # Температура: int16 LE (см. radex_read_hook.h *) — super-set safe.
  - interval: 4300ms
    then:
      - lambda: |-
          using namespace esphome::radex_hook;
          static RadexReadHook hook;
          static bool hook_registered = false;
          if (!hook_registered) {
            hook.set_callback([](uint16_t handle, const uint8_t* data, uint16_t len) {
              // Формат payload зависит от handle (см. radex_read_hook.h GATT-карта):
              //   0x0040 float32 LE — radon avg (device), Bq/m³
              //   0x0049 float32 LE — radon last, Bq/m³
              //   0x0058 int16   LE — temperature × 10 → °C (super-set safe)
              //   0x005E uint8       — humidity, %
              if (handle == 0x0040) {
                float v = decode_float_le(data, len);
                if (std::isfinite(v) && v >= 0) {
                  id(radon_avg_device).publish_state(v);
                  ESP_LOGD("radex", "radon_avg_device=%.2f Bq/m3", v);
                }
              } else if (handle == 0x0049) {
                float v = decode_float_le(data, len);
                if (std::isfinite(v) && v >= 0) {
                  id(radon_last).publish_state(v);
                  ESP_LOGD("radex", "radon=%.2f Bq/m3", v);
                }
              } else if (handle == 0x0058) {
                int16_t raw = decode_i16_le(data, len);
                float t = raw / 10.0f;
                if (t >= -40 && t <= 85) {
                  id(temp_radex).publish_state(t);
                  ESP_LOGD("radex", "temp=%.1f C", t);
                }
              } else if (handle == 0x005E) {
                if (len >= 1) {
                  float h = (float) data[0];
                  if (h >= 0 && h <= 100) {
                    id(humidity_radex).publish_state(h);
                    ESP_LOGD("radex", "hum=%.0f %%", h);
                  }
                }
              }
            });
            id(ble_radex).register_ble_node(&hook);
            hook_registered = true;
            ESP_LOGI("radex", "BLEClientNode hook registered (step5, 4 handles)");
          }
          if (!id(ble_radex).connected()) return;
          esp_gatt_if_t if_g = (esp_gatt_if_t) id(ble_radex).get_gattc_if();
          uint16_t conn = id(ble_radex).get_conn_id();
          // STEP 5: 4 хэндла round-robin, период каждого = 4 * 4.3 = 17.2с.
          static const uint16_t handles[] = {0x0049, 0x0058, 0x005E, 0x0040};
          static uint8_t cursor = 0;
          uint16_t h = handles[cursor];
          cursor = (cursor + 1) % 4;
          esp_err_t e = esp_ble_gattc_read_char(if_g, conn, h, ESP_GATT_AUTH_REQ_NONE);
          if (e != ESP_OK) ESP_LOGW("radex_poll", "READ h=0x%04X ret=%d", h, e);

  # heap-лог 5s — отключён в v0.3.0-step6c-log: после фикса json:111
  # (log:true + logger.level WARN) инструментовка не нужна. ESP_LOGI и так не
  # пройдёт WARN-фильтр, но лучше явно убрать как источник трафика.
  # Раскомментировать при возобновлении охоты на регрессию + временно поднять
  # logger.level до INFO/DEBUG.
  # - interval: 5s
  #   then:
  #     - lambda: |-
  #         ESP_LOGI("heap", "free=%u largest=%u min_ever=%u",
  #                  (unsigned) heap_caps_get_free_size(MALLOC_CAP_8BIT),
  #                  (unsigned) heap_caps_get_largest_free_block(MALLOC_CAP_8BIT),
  #                  (unsigned) heap_caps_get_minimum_free_size(MALLOC_CAP_8BIT));

  # STEP 4: Народмон auto-upload каждые 300с (спецификация narodmon.ru — ≥5 мин)
  - interval: 300s
    then:
      - if:
          condition:
            switch.is_on: narodmon_enabled
          then:
            - script.execute: send_narodmon

  # WiFi-watchdog: reboot_timeout:0s убрал авто-recovery, свой watchdog
  # рестартит при зависании WiFi-стека >180с (arch_restart, кросс-фреймворк).
  - interval: 10s
    then:
      - lambda: |-
          static uint32_t wifi_down_s = 0;
          if (wifi::global_wifi_component->is_connected()) {
            wifi_down_s = 0;
          } else {
            wifi_down_s += 10;
            ESP_LOGW("wifi_wd", "WiFi down %us (restart at 180s)", wifi_down_s);
            if (wifi_down_s >= 180) {
              ESP_LOGE("wifi_wd", "WiFi hung >180s -> arch_restart()");
              arch_restart();
            }
          }