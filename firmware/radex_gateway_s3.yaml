# ══════════════════════════════════════════════════════════════════════
#  radex_gateway_s3.yaml — Radex MR107ion BLE → Web UI (Narodmon infra, OFF)
#
#  Порт Radex-шлюза на ESP32-S3 (QFN56 rev0.2, 8 MB PSRAM, 16 MB Flash).
#  Базируется на radex_gateway.yaml v0.3.0-step6g (старая Radex-плата на ESP32-DevKitC).
#
#  Платформа:
#    - esp32: board=esp32-s3-devkitc-1, variant=esp32s3, framework=arduino.
#      sdkconfig_options УДАЛЕНЫ — esp-idf-only, на arduino не применимы.
#    - device_name=radex-gw-s3 (тот же, что и baseline → OTA-обновление).
#    - AP fallback закрытый (pass = !secret ap_password).
#    - bluetooth_proxy УБРАН (2026-06-21): WiFi-интерференция 2.4 ГГц.
#
#  step2 (средние ОА):
#    - sliding_window_moving_average для radon_last → sensors `radon_avg_hour`
#      (60 × 60s = 1ч) и `radon_avg_day` (1440 × 60s = 24ч).
#    - web_server.log: true — Debug Log виджет в Web UI v3 (исключение
#      HARD-правила #2 в проектном CLAUDE.md по запросу оператора).
#
#  step3 (Народмон-инфраструктура, по умолчанию ВЫКЛ):
#    - switch narodmon_enabled — restore_mode: ALWAYS_OFF (после ребута/safe-mode
#      всегда OFF; safety-критичный).
#    - select narodmon_method (HTTP GET / HTTP POST / HTTPS POST / JSON POST,
#      дефолт HTTP GET).
#    - button narodmon_send_now — ручной триггер (не нажимать в production без
#      подтверждения; в проекте автора — БАН Народмон HARD HOLD).
#    - text nm_radon / nm_temp / nm_hum (имена метрик RR1 / T1 / H1).
#    - script send_narodmon — 4 ветки по протоколам.
#    - interval 300s — авто-отправка ТОЛЬКО при narodmon_enabled.state == true.
#    - http_request (verify_ssl: false, timeout 5s).
#    - time SNTP — нужен для HTTPS handshake.
#
#  Если будет нужно поднимать LWIP_MAX_SOCKETS — это уже потребует возврата
#  на esp-idf (Windows без MSYS2 → проектный блок). Пока с web_server + api
#  + http_request 10 сокетов хватает.
# ══════════════════════════════════════════════════════════════════════

substitutions:
  device_name: radex-gw-s3
  device_friendly: "Radex Gateway S3"
  # Локальный путь — переопределите под свою систему (вынесен из C:\Users\... во избежание UnicodeDecodeError).
  build_path: ./.esphome_build/radex-gw-s3

esphome:
  name: ${device_name}
  friendly_name: ${device_friendly}
  comment: "Radex MR107ion -> Web UI (ESP32-S3, arduino, Narodmon infra OFF)"
  min_version: 2025.8.0
  build_path: ${build_path}
  includes:
    - include/esp_diag.h
    - include/radex_read_hook.h
  on_boot:
    priority: -300
    then:
      - lambda: |-
          id(ble_connects).publish_state((float) id(ble_connect_count));
          id(ble_disconnects).publish_state((float) id(ble_disconnect_count));
          ESP_LOGI("boot", "Radex Gateway S3 step3 (arduino, Narodmon infra OFF by default) booted, web UI: http://%s.local/", "${device_name}");

esp32:
  board: esp32-s3-devkitc-1
  variant: esp32s3
  framework:
    type: arduino

logger:
  level: INFO
  baud_rate: 115200

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  power_save_mode: none
  output_power: 8.5dB
  ap:
    ssid: "radex-gw-s3 Fallback"
    password: !secret ap_password

api:
  encryption:
    key: !secret api_encryption_key
  reboot_timeout: 0s

ota:
  - platform: esphome
    id: ota_esphome
    password: !secret ota_password
  - platform: web_server

# HARD-правила проекта:
#   - log: true   → ИСКЛЮЧЕНИЕ для S3 (2026-06-17, оператор): нативная вкладка
#                   логов в Web UI v3. Если пойдут ребуты / json:111 / OOM —
#                   откатить в false без переспроса и доложить (INC-05-like).
#                   Аналогичное исключение действует для C3 (radon_ha_gateway_c3).
#   - auth        → срезает phantom XRay keep-alive на 401 (INC-10).
web_server:
  version: 3
  port: 80
  include_internal: false
  local: true
  log: true
  auth:
    username: !secret web_server_auth_user
    password: !secret web_server_auth_pass
  sorting_groups:
    - id: sg_data
      name: "Данные"
      sorting_weight: 10
    - id: sg_service
      name: "Сервис"
      sorting_weight: 20

mdns:
  disabled: false

time:
  - platform: sntp
    id: sntp_time
    timezone: Europe/Moscow

# HTTP-клиент для Народмона. verify_ssl: false — на arduino+S3 root CA
# bundle не подгружается; HTTPS handshake работает без проверки серта.
http_request:
  verify_ssl: false
  timeout: 5s
  useragent: "esphome-radex-gw-s3/1.0"

esp32_ble_tracker:
  scan_parameters:
    interval: 640ms
    window: 32ms
    active: true

esp32_ble:
  max_connections: 1

# bluetooth_proxy УБРАН (2026-06-21): WiFi-интерференция 2.4 ГГц.

globals:
  - id: ble_connect_count
    type: uint32_t
    restore_value: false
    initial_value: '0'
  - id: ble_disconnect_count
    type: uint32_t
    restore_value: false
    initial_value: '0'

ble_client:
  - mac_address: !secret radex_mac
    id: ble_radex
    auto_connect: true
    on_connect:
      - lambda: |-
          id(ble_connect_count) += 1;
          ESP_LOGI("radex", "===== Radex CONNECTED (#%u) =====", (unsigned) id(ble_connect_count));
          id(ble_connects).publish_state((float) id(ble_connect_count));
          id(ble_connected).publish_state(true);
    on_disconnect:
      - lambda: |-
          id(ble_disconnect_count) += 1;
          ESP_LOGW("radex", "Radex DISCONNECT (#%u)", (unsigned) id(ble_disconnect_count));
          id(ble_disconnects).publish_state((float) id(ble_disconnect_count));
          id(ble_connected).publish_state(false);

sensor:
  # ─── ДАННЫЕ (sg_data) ───
  - platform: template
    name: "ОА радона (последняя)"
    id: radon_last
    unit_of_measurement: "Bq/m³"
    accuracy_decimals: 1
    icon: "mdi:radioactive"
    update_interval: never
    web_server:
      sorting_group_id: sg_data
      sorting_weight: 10

  - platform: template
    name: "ОА радона (среднее, прибор)"
    id: radon_avg_device
    unit_of_measurement: "Bq/m³"
    accuracy_decimals: 1
    icon: "mdi:radioactive-circle"
    update_interval: never
    web_server:
      sorting_group_id: sg_data
      sorting_weight: 20

  # ── step2 (2026-06-17): скользящие средние ОА за час и за день ──
  # Сэмплируем radon_last каждые 60 с; sliding_window_moving_average даёт
  # rolling-average по окну. Сэмплы при отсутствии BLE-связи отбрасываются
  # (lambda возвращает NaN → filter_out: nan), чтобы зомби-значения не
  # засоряли среднее. До наполнения окна публикуется среднее доступных
  # сэмплов (send_first_at: 1, send_every: 1 → виден сразу после первого
  # BLE-чтения, обновляется ежеминутно).
  #   hour: window 60 × 60 c = 60 минут; ~240 байт.
  #   day : window 1440 × 60 c = 24 часа; ~5.6 KB DRAM.
  - platform: template
    name: "ОА радона (среднее, час)"
    id: radon_avg_hour
    unit_of_measurement: "Bq/m³"
    accuracy_decimals: 1
    icon: "mdi:timer-outline"
    state_class: measurement
    update_interval: 60s
    lambda: |-
      if (id(radon_last).has_state() && id(ble_radex).connected()) {
        return id(radon_last).state;
      }
      return NAN;
    filters:
      - filter_out: nan
      - sliding_window_moving_average:
          window_size: 60
          send_every: 1
          send_first_at: 1
    web_server:
      sorting_group_id: sg_data
      sorting_weight: 25

  - platform: template
    name: "ОА радона (среднее, день)"
    id: radon_avg_day
    unit_of_measurement: "Bq/m³"
    accuracy_decimals: 1
    icon: "mdi:calendar-today"
    state_class: measurement
    update_interval: 60s
    lambda: |-
      if (id(radon_last).has_state() && id(ble_radex).connected()) {
        return id(radon_last).state;
      }
      return NAN;
    filters:
      - filter_out: nan
      - sliding_window_moving_average:
          window_size: 1440
          send_every: 1
          send_first_at: 1
    web_server:
      sorting_group_id: sg_data
      sorting_weight: 27

  - platform: template
    name: "Температура"
    id: temp_radex
    unit_of_measurement: "°C"
    accuracy_decimals: 1
    icon: "mdi:thermometer"
    device_class: temperature
    state_class: measurement
    update_interval: never
    web_server:
      sorting_group_id: sg_data
      sorting_weight: 30

  - platform: template
    name: "Влажность"
    id: humidity_radex
    unit_of_measurement: "%"
    accuracy_decimals: 1
    icon: "mdi:water-percent"
    device_class: humidity
    state_class: measurement
    update_interval: never
    web_server:
      sorting_group_id: sg_data
      sorting_weight: 40

  - platform: uptime
    name: "Время работы"
    id: esp_uptime
    update_interval: 30s
    web_server:
      sorting_group_id: sg_data
      sorting_weight: 50

  # ─── СЕРВИС (sg_service) ───
  - platform: wifi_signal
    name: "WiFi сигнал"
    id: wifi_rssi
    update_interval: 30s
    entity_category: diagnostic
    web_server:
      sorting_group_id: sg_service
      sorting_weight: 10

  - platform: template
    name: "BLE: успешных коннектов"
    id: ble_connects
    accuracy_decimals: 0
    icon: "mdi:bluetooth-connect"
    update_interval: never
    entity_category: diagnostic
    web_server:
      sorting_group_id: sg_service
      sorting_weight: 20

  - platform: template
    name: "BLE: реконнектов всего"
    id: ble_disconnects
    accuracy_decimals: 0
    icon: "mdi:bluetooth-off"
    update_interval: never
    entity_category: diagnostic
    web_server:
      sorting_group_id: sg_service
      sorting_weight: 30

binary_sensor:
  - platform: template
    name: "BLE: Radex подключён"
    id: ble_connected
    device_class: connectivity
    icon: "mdi:bluetooth"
    web_server:
      sorting_group_id: sg_data
      sorting_weight: 5

  - platform: status
    name: "API подключён"
    id: api_connected
    entity_category: diagnostic
    web_server:
      sorting_group_id: sg_service
      sorting_weight: 40

text_sensor:
  - platform: wifi_info
    ip_address:
      name: "IP адрес"
      id: wifi_ip
      icon: "mdi:ip-network"
      entity_category: diagnostic
      web_server:
        sorting_group_id: sg_service
        sorting_weight: 50
    ssid:
      name: "Подключено к WiFi"
      id: wifi_ssid_t
      icon: "mdi:wifi"
      entity_category: diagnostic
      web_server:
        sorting_group_id: sg_service
        sorting_weight: 60
    bssid:
      name: "WiFi BSSID"
      id: wifi_bssid_t
      icon: "mdi:access-point"
      entity_category: diagnostic
      web_server:
        sorting_group_id: sg_service
        sorting_weight: 70
    mac_address:
      name: "ESP32 MAC"
      id: esp_mac
      icon: "mdi:network"
      entity_category: diagnostic
      web_server:
        sorting_group_id: sg_service
        sorting_weight: 80

button:
  - platform: safe_mode
    id: button_safe_mode
    name: "Перезагрузить (Safe Mode)"
    icon: "mdi:restart"
    web_server:
      sorting_group_id: sg_service
      sorting_weight: 100

  - platform: factory_reset
    id: factory_reset_btn
    name: "Сброс к заводским"
    icon: "mdi:factory"
    web_server:
      sorting_group_id: sg_service
      sorting_weight: 110

  - platform: restart
    name: "Перезагрузить"
    icon: "mdi:power-cycle"
    web_server:
      sorting_group_id: sg_service
      sorting_weight: 115

  - platform: template
    name: "Переподключиться к Radex"
    id: ble_reconnect_btn
    icon: "mdi:bluetooth-transfer"
    on_press:
      - lambda: |-
          ESP_LOGI("radex", "Manual BLE reconnect requested");
          id(ble_radex).disconnect();
    web_server:
      sorting_group_id: sg_service
      sorting_weight: 120

  - platform: template
    name: "Сбросить счётчики BLE"
    id: ble_counters_reset
    icon: "mdi:counter"
    on_press:
      - lambda: |-
          id(ble_connect_count) = 0;
          id(ble_disconnect_count) = 0;
          id(ble_connects).publish_state(0);
          id(ble_disconnects).publish_state(0);
          ESP_LOGI("radex", "BLE counters reset to 0");
    web_server:
      sorting_group_id: sg_service
      sorting_weight: 130

  # Manual override: запускает send_narodmon независимо от switch.
  # БАН HARD HOLD 2026-06-14 — НЕ нажимать без явного «да» оператора.
  - platform: template
    name: "Отправить на Народмон сейчас"
    id: narodmon_send_now
    icon: "mdi:cloud-upload"
    on_press:
      - script.execute: send_narodmon
    web_server:
      sorting_group_id: sg_service
      sorting_weight: 200

# ── Народмон switch + select + editable metric names ──
# HARD: restore_mode: ALWAYS_OFF — после ребута/safe_mode switch ВСЕГДА OFF,
# не зависит от прошлого состояния. Это критическая часть соблюдения
# БАН Народмон HARD HOLD (2026-06-14).
switch:
  - platform: template
    name: "Выгружать на Народмон"
    id: narodmon_enabled
    icon: "mdi:cloud-upload"
    restore_mode: ALWAYS_OFF
    optimistic: true
    web_server:
      sorting_group_id: sg_service
      sorting_weight: 210

# Выбор протокола (по narodmon-iot SKILL.md):
#   HTTP GET   — параметры в URL, endpoint http://narodmon.ru/get
#   HTTP POST  — те же поля form-encoded, endpoint http://narodmon.ru/post
#   HTTPS POST — то же тело через TLS на https://narodmon.ru/post
#                (тяжелее mbedTLS handshake).
#   JSON POST  — JSON-тело на http://narodmon.ru/json, ответ тоже JSON.
select:
  - platform: template
    name: "Способ отправки на Народмон"
    id: narodmon_method
    icon: "mdi:upload-network"
    optimistic: true
    restore_value: true
    initial_option: "HTTP GET"
    options:
      - "HTTP GET"
      - "HTTP POST"
      - "HTTPS POST"
      - "JSON POST"
    web_server:
      sorting_group_id: sg_service
      sorting_weight: 220

text:
  - platform: template
    name: "Имя метрики: радон"
    id: nm_radon
    optimistic: true
    restore_value: true
    mode: text
    initial_value: "RR1"
    max_length: 16
    icon: "mdi:tag-text"
    web_server:
      sorting_group_id: sg_service
      sorting_weight: 230

  - platform: template
    name: "Имя метрики: температура"
    id: nm_temp
    optimistic: true
    restore_value: true
    mode: text
    initial_value: "T1"
    max_length: 16
    icon: "mdi:tag-text"
    web_server:
      sorting_group_id: sg_service
      sorting_weight: 240

  - platform: template
    name: "Имя метрики: влажность"
    id: nm_hum
    optimistic: true
    restore_value: true
    mode: text
    initial_value: "H1"
    max_length: 16
    icon: "mdi:tag-text"
    web_server:
      sorting_group_id: sg_service
      sorting_weight: 250

# ── send_narodmon script (manual + auto, 4 метода) ──
# Тело payload одинаковое: ID=<ESP_MAC>&<RR1>=<radon>&<T1>=<temp>&<H1>=<hum>.
# Разница только в transport: GET кладёт в URL, остальные — в body.
script:
  - id: send_narodmon
    then:
      - if:
          condition:
            and:
              - wifi.connected:
              - lambda: "return !std::isnan(id(radon_last).state);"
          then:
            # ── HTTP GET ────────────────────────────────────
            - if:
                condition:
                  lambda: 'return id(narodmon_method).state == "HTTP GET";'
                then:
                  - http_request.get:
                      url: !lambda |-
                        char url[320];
                        int n = snprintf(url, sizeof(url),
                          "http://narodmon.ru/get?ID=%s&%s=%.1f",
                          id(esp_mac).state.c_str(),
                          id(nm_radon).state.c_str(), id(radon_last).state);
                        if (n > 0 && (size_t) n < sizeof(url) && !std::isnan(id(temp_radex).state)) {
                          n += snprintf(url + n, sizeof(url) - n,
                            "&%s=%.1f", id(nm_temp).state.c_str(), id(temp_radex).state);
                        }
                        if (n > 0 && (size_t) n < sizeof(url) && !std::isnan(id(humidity_radex).state)) {
                          n += snprintf(url + n, sizeof(url) - n,
                            "&%s=%.0f", id(nm_hum).state.c_str(), id(humidity_radex).state);
                        }
                        ESP_LOGI("narodmon", "GET %s", url);
                        return std::string(url);
                      capture_response: true
                      on_response:
                        then:
                          - lambda: |-
                              ESP_LOGI("narodmon", "GET HTTP %d, body: %s",
                                       response->status_code, body.c_str());
            # ── HTTP POST ───────────────────────────────────
            - if:
                condition:
                  lambda: 'return id(narodmon_method).state == "HTTP POST";'
                then:
                  - http_request.post:
                      url: "http://narodmon.ru/post"
                      request_headers:
                        Content-Type: "application/x-www-form-urlencoded"
                      body: !lambda |-
                        char body[320];
                        int n = snprintf(body, sizeof(body),
                          "ID=%s&%s=%.1f",
                          id(esp_mac).state.c_str(),
                          id(nm_radon).state.c_str(), id(radon_last).state);
                        if (n > 0 && (size_t) n < sizeof(body) && !std::isnan(id(temp_radex).state)) {
                          n += snprintf(body + n, sizeof(body) - n,
                            "&%s=%.1f", id(nm_temp).state.c_str(), id(temp_radex).state);
                        }
                        if (n > 0 && (size_t) n < sizeof(body) && !std::isnan(id(humidity_radex).state)) {
                          n += snprintf(body + n, sizeof(body) - n,
                            "&%s=%.0f", id(nm_hum).state.c_str(), id(humidity_radex).state);
                        }
                        ESP_LOGI("narodmon", "POST body: %s", body);
                        return std::string(body);
                      capture_response: true
                      on_response:
                        then:
                          - lambda: |-
                              ESP_LOGI("narodmon", "POST HTTP %d, body: %s",
                                       response->status_code, body.c_str());
            # ── HTTPS POST ──────────────────────────────────
            - if:
                condition:
                  lambda: 'return id(narodmon_method).state == "HTTPS POST";'
                then:
                  - http_request.post:
                      url: "https://narodmon.ru/post"
                      request_headers:
                        Content-Type: "application/x-www-form-urlencoded"
                      body: !lambda |-
                        char body[320];
                        int n = snprintf(body, sizeof(body),
                          "ID=%s&%s=%.1f",
                          id(esp_mac).state.c_str(),
                          id(nm_radon).state.c_str(), id(radon_last).state);
                        if (n > 0 && (size_t) n < sizeof(body) && !std::isnan(id(temp_radex).state)) {
                          n += snprintf(body + n, sizeof(body) - n,
                            "&%s=%.1f", id(nm_temp).state.c_str(), id(temp_radex).state);
                        }
                        if (n > 0 && (size_t) n < sizeof(body) && !std::isnan(id(humidity_radex).state)) {
                          n += snprintf(body + n, sizeof(body) - n,
                            "&%s=%.0f", id(nm_hum).state.c_str(), id(humidity_radex).state);
                        }
                        ESP_LOGI("narodmon", "HTTPS POST body: %s", body);
                        return std::string(body);
                      capture_response: true
                      on_response:
                        then:
                          - lambda: |-
                              ESP_LOGI("narodmon", "HTTPS POST HTTP %d, body: %s",
                                       response->status_code, body.c_str());
            # ── JSON POST ───────────────────────────────────
            # http://narodmon.ru/json, Content-Type application/json.
            # Тело: {"devices":[{"mac":"<MAC>","sensors":[
            #         {"id":"<RR1>","value":<radon>},
            #         {"id":"<T1>","value":<temp>},
            #         {"id":"<H1>","value":<hum>}]}]}
            - if:
                condition:
                  lambda: 'return id(narodmon_method).state == "JSON POST";'
                then:
                  - http_request.post:
                      url: "http://narodmon.ru/json"
                      request_headers:
                        Content-Type: "application/json"
                      body: !lambda |-
                        char body[384];
                        int n = snprintf(body, sizeof(body),
                          "{\"devices\":[{\"mac\":\"%s\",\"sensors\":["
                            "{\"id\":\"%s\",\"value\":%.1f}",
                          id(esp_mac).state.c_str(),
                          id(nm_radon).state.c_str(), id(radon_last).state);
                        if (n > 0 && (size_t) n < sizeof(body) && !std::isnan(id(temp_radex).state)) {
                          n += snprintf(body + n, sizeof(body) - n,
                            ",{\"id\":\"%s\",\"value\":%.1f}",
                            id(nm_temp).state.c_str(), id(temp_radex).state);
                        }
                        if (n > 0 && (size_t) n < sizeof(body) && !std::isnan(id(humidity_radex).state)) {
                          n += snprintf(body + n, sizeof(body) - n,
                            ",{\"id\":\"%s\",\"value\":%.0f}",
                            id(nm_hum).state.c_str(), id(humidity_radex).state);
                        }
                        if (n > 0 && (size_t) n < sizeof(body)) {
                          snprintf(body + n, sizeof(body) - n, "]}]}");
                        }
                        ESP_LOGI("narodmon", "JSON POST body: %s", body);
                        return std::string(body);
                      capture_response: true
                      on_response:
                        then:
                          - lambda: |-
                              ESP_LOGI("narodmon", "JSON POST HTTP %d, body: %s",
                                       response->status_code, body.c_str());

light:
  - platform: esp32_rmt_led_strip
    rgb_order: GRB
    pin: GPIO48
    num_leds: 1
    chipset: WS2812
    id: heartbeat_led
    name: "Heartbeat LED"
    internal: true

interval:
  - interval: 2s
    then:
      - light.turn_on:
          id: heartbeat_led
          brightness: 15%
          red: 0
          green: 1
          blue: 0
      - delay: 100ms
      - light.turn_off: heartbeat_led

  # READ-poll round-robin по 4 хэндлам, период каждого = 4 * 4.3 = 17.2 с.
  # 0x0040 radon_avg_device, 0x0049 radon_last, 0x0058 temperature, 0x005E humidity.
  # Радон: гард только NaN/отрицательные — верхний предел шкалы MR107ion
  # не документирован Quarta-Rad, реалистичных потолков ставить не угадываем.
  # Температура: int16 LE (см. radex_read_hook.h *) — super-set safe.
  - interval: 4300ms
    then:
      - lambda: |-
          using namespace esphome::radex_hook;
          static RadexReadHook hook;
          static bool hook_registered = false;
          if (!hook_registered) {
            hook.set_callback([](uint16_t handle, const uint8_t* data, uint16_t len) {
              if (handle == 0x0040) {
                float v = decode_float_le(data, len);
                if (std::isfinite(v) && v >= 0) {
                  id(radon_avg_device).publish_state(v);
                  ESP_LOGD("radex", "radon_avg_device=%.2f Bq/m3", v);
                }
              } else if (handle == 0x0049) {
                float v = decode_float_le(data, len);
                if (std::isfinite(v) && v >= 0) {
                  id(radon_last).publish_state(v);
                  ESP_LOGD("radex", "radon=%.2f Bq/m3", v);
                }
              } else if (handle == 0x0058) {
                if (len >= 2) {
                  int16_t raw = decode_i16_le(data, len);
                  float t = raw / 10.0f;
                  if (t >= -40 && t <= 85) {
                    id(temp_radex).publish_state(t);
                    ESP_LOGD("radex", "temp=%.1f C", t);
                  }
                }
              } else if (handle == 0x005E) {
                if (len >= 1) {
                  float h = (float) data[0];
                  if (h >= 0 && h <= 100) {
                    id(humidity_radex).publish_state(h);
                    ESP_LOGD("radex", "hum=%.0f %%", h);
                  }
                }
              }
            });
            id(ble_radex).register_ble_node(&hook);
            hook_registered = true;
            ESP_LOGI("radex", "BLEClientNode hook registered (4 handles)");
          }
          if (!id(ble_radex).connected()) return;
          esp_gatt_if_t if_g = (esp_gatt_if_t) id(ble_radex).get_gattc_if();
          uint16_t conn = id(ble_radex).get_conn_id();
          static const uint16_t handles[] = {0x0049, 0x0058, 0x005E, 0x0040};
          static uint8_t cursor = 0;
          uint16_t h = handles[cursor];
          cursor = (cursor + 1) % 4;
          esp_err_t e = esp_ble_gattc_read_char(if_g, conn, h, ESP_GATT_AUTH_REQ_NONE);
          if (e != ESP_OK) ESP_LOGW("radex_poll", "READ h=0x%04X ret=%d", h, e);

  # WiFi-watchdog: reboot_timeout:0s убрал авто-recovery, свой watchdog
  # рестартит при зависании WiFi-стека >180с (arch_restart, кросс-фреймворк).
  - interval: 10s
    then:
      - lambda: |-
          static uint32_t wifi_down_s = 0;
          if (wifi::global_wifi_component->is_connected()) {
            wifi_down_s = 0;
          } else {
            wifi_down_s += 10;
            ESP_LOGW("wifi_wd", "WiFi down %us (restart at 180s)", wifi_down_s);
            if (wifi_down_s >= 180) {
              ESP_LOGE("wifi_wd", "WiFi hung >180s -> arch_restart()");
              arch_restart();
            }
          }

  # Авто-отправка на Народмон раз в 5 минут — ТОЛЬКО при включённом switch.
  # БАН HARD HOLD 2026-06-14: switch стартует в OFF (restore_mode: ALWAYS_OFF),
  # поэтому этот интервал ничего не отправляет, пока оператор явно не включит.
  - interval: 300s
    then:
      - if:
          condition:
            lambda: 'return id(narodmon_enabled).state;'
          then:
            - script.execute: send_narodmon
