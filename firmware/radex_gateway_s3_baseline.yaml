# ══════════════════════════════════════════════════════════════════════
#  radex_gateway_s3_baseline.yaml — минимальный bt-proxy под ESP32-S3
#
#  Назначение: ШАГ 0 порта Radex-шлюза на новую плату ESP32-S3 (QFN56 rev0.2,
#  8 MB PSRAM, MAC AA:BB:CC:DD:EE:FF, USB через CH343 на COM12 при заливке).
#  После того как плата зайдёт в сеть, стабильно проживёт ≥5 мин в браузере
#  и пройдёт первая bt-proxy валидация — поверх достраиваются сенсоры Radex
#  (BLE-клиент + radon/T/H + Народмон) до уровня radex_gateway.yaml v0.3.0-step6g.
#
#  framework=arduino, не esp-idf — проектное правило (esp-idf не работает на
#  Windows без MSYS2). Соответствует выбору radon_ha_gateway_c3.yaml.
#  PSRAM пока НЕ включаю — добавим позже, если будет нужен heap headroom.
# ══════════════════════════════════════════════════════════════════════

substitutions:
  device_name: radex-gw-s3
  device_friendly: "Radex Gateway S3 (baseline)"

esphome:
  name: ${device_name}
  friendly_name: ${device_friendly}
  min_version: 2025.8.0
  build_path: D:/esp32_radex_build/radex-gw-s3

esp32:
  board: esp32-s3-devkitc-1
  variant: esp32s3
  framework:
    type: arduino

logger:
  level: INFO
  baud_rate: 115200

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  power_save_mode: none
  ap:
    ssid: "radex-gw-s3 Fallback"
    password: !secret ap_password

captive_portal:

api:
  encryption:
    key: !secret api_encryption_key
  reboot_timeout: 0s

ota:
  - platform: esphome
    password: !secret ota_password
  - platform: web_server

# HARD-правила проекта:
#   - log: false  → SSE + log = json:111 / near-OOM (INC-05 Radex). Без исключений.
#   - auth        → срезает phantom XRay keep-alive на 401 (INC-10 AtomFast).
web_server:
  version: 3
  port: 80
  auth:
    username: radex
    password: !secret ota_password
  log: false

mdns:
  disabled: false

# scan_parameters: 640/32 (~5%) — HARD на esp-idf (INC-12). На arduino-framework
# coex-субсистема не активна, поэтому 600/180 (duty 30%) работало; но для единства
# режима с radon_ha_gateway_c3 и страховки на S3 (новая плата, неизвестная RF-среда)
# беру 640/32 как консервативный старт. Подкрутим после реального прогона.
esp32_ble_tracker:
  scan_parameters:
    interval: 640ms
    window: 32ms
    active: true

bluetooth_proxy:
  active: true

button:
  - platform: safe_mode
    name: "Safe Mode Boot"

  - platform: factory_reset
    name: "Сбросить WiFi"

  - platform: restart
    name: "Перезагрузить"

sensor:
  - platform: wifi_signal
    name: "WiFi сигнал"
    update_interval: 60s

  - platform: uptime
    name: "Uptime"
    update_interval: 60s

text_sensor:
  - platform: wifi_info
    ip_address:
      name: "IP адрес"
