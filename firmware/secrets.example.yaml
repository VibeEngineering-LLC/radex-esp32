# ─── Пример secrets.yaml для radex_gateway.yaml ───
# Скопируй в secrets.yaml (gitignored) и подставь свои значения.

wifi_ssid: "MyHomeWiFi"
wifi_password: "ChangeMe"

# Опционально: вторая сеть (fallback / альтернативный SSID).
# Используется блоком wifi.networks: - ESP подключится к доступной с лучшим RSSI.
# Если вторая сеть не нужна — оставь те же значения, что у первой, или удали
# блок networks: и используй одиночный ssid:/password: в YAML.
wifi_ssid_2: "MyHomeWiFi2"
wifi_password_2: "ChangeMe2"

# Шестизначный API ключ для encryption в Home Assistant.
# Сгенерировать: python -c "import secrets,base64; print(base64.b64encode(secrets.token_bytes(32)).decode())"
api_encryption_key: "GENERATE_BASE64_32_BYTES_KEY_HERE"

# Пароль OTA
ota_password: "ChangeMeOTA"

# Пароль fallback-AP (если WiFi-сеть недоступна, плата поднимает свою AP
# "radex-gateway Fallback" с этим паролем — оператор подключается с телефона,
# через captive portal вводит SSID/пароль домашней сети).
# Используется в wifi.ap.password (radex_gateway_s3.yaml / radex_gateway_s3_baseline.yaml).
ap_password: "ChangeMeAP"

# step6e: HTTP Basic Auth для web_server.
# Защищает Web UI: при подключении браузера запрашивает логин/пароль.
# Побочный эффект (главная польза): фантомные коннекты (XRay-keep-alive,
# HA-автодискавери, бот-сканеры в локалке) получают 401 БЕЗ открытия SSE —
# снижает нагрузку на JSON-документ web_server v2.
web_server_auth_user: "admin"
web_server_auth_pass: "ChangeMeAuth"

# MAC адрес Radex MR107ion (UPPERCASE с двоеточиями).
# Найти через ble-explorer Web UI → BLE Scanner → искать имя "MR107ion XXXX".
# Тот же MAC надо продублировать в substitutions.radex_mac_str в YAML
# (для RSSI sensor на_ble_advertise).
radex_mac: "AA:BB:CC:DD:EE:FF"